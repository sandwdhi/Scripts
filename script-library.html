<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Script Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0c0f;
      --surface: #13151a;
      --surface2: #1c1f27;
      --border: #2a2d38;
      --accent: #e8ff47;
      --accent2: #47c8ff;
      --text: #eef0f6;
      --muted: #6b7082;
      --danger: #ff5e5e;
      --radius: 10px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NOISE OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(11,12,15,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo span {
      display: inline-block;
      background: var(--accent);
      color: #0b0c0f;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .header-actions { display: flex; gap: 0.75rem; align-items: center; }

    /* ── BUTTONS ── */
    .btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      border-radius: var(--radius);
      padding: 0.55rem 1.1rem;
      transition: all 0.15s ease;
      letter-spacing: 0.03em;
    }

    .btn-primary {
      background: var(--accent);
      color: #0b0c0f;
    }
    .btn-primary:hover { background: #d4e83e; transform: translateY(-1px); }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid transparent;
      padding: 0.3rem 0.6rem;
      font-size: 0.72rem;
    }
    .btn-danger:hover { border-color: var(--danger); background: rgba(255,94,94,0.08); }

    .btn-download {
      background: var(--surface2);
      color: var(--accent2);
      border: 1px solid rgba(71,200,255,0.2);
      padding: 0.35rem 0.75rem;
      font-size: 0.72rem;
    }
    .btn-download:hover { background: rgba(71,200,255,0.1); border-color: var(--accent2); }

    /* ── MAIN LAYOUT ── */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    /* ── HERO ── */
    .hero {
      padding: 3rem 0 2rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }

    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.05;
      margin-bottom: 0.75rem;
    }

    .hero h1 em {
      font-style: normal;
      color: var(--accent);
    }

    .hero p {
      color: var(--muted);
      font-size: 0.88rem;
      max-width: 480px;
      line-height: 1.7;
    }

    /* ── STATS BAR ── */
    .stats-bar {
      display: flex;
      gap: 2rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }

    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent);
    }
    .stat-label { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }

    /* ── CONTROLS ── */
    .controls {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 220px;
    }

    .search-wrap svg {
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    input[type="text"], input[type="search"], select, textarea {
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 0.6rem 0.85rem;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    input[type="search"] { padding-left: 2.5rem; }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
    }

    select option { background: var(--surface2); }

    /* ── ALPHABET INDEX ── */
    .alpha-index {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 1.5rem;
    }

    .alpha-btn {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
    }

    .alpha-btn:hover { background: var(--surface2); color: var(--text); }
    .alpha-btn.active { background: var(--accent); color: #0b0c0f; border-color: var(--accent); }
    .alpha-btn.has-items { color: var(--text); border-color: #3a3d4a; }
    .alpha-btn.empty { opacity: 0.3; cursor: default; }
    .alpha-btn.empty:hover { background: var(--surface); color: var(--muted); }

    /* ── SCRIPT GRID ── */
    .scripts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
    }

    .script-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: border-color 0.2s, transform 0.2s;
      animation: fadeUp 0.25s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .script-card:hover {
      border-color: #3a3d4a;
      transform: translateY(-2px);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .card-initial {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      color: var(--accent);
      line-height: 1;
      min-width: 36px;
    }

    .card-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
      word-break: break-word;
    }

    .card-badge {
      font-size: 0.68rem;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--surface2);
      color: var(--accent2);
      border: 1px solid rgba(71,200,255,0.2);
      white-space: nowrap;
      letter-spacing: 0.05em;
    }

    .card-desc {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.6;
      flex: 1;
      word-break: break-word;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    .card-meta {
      font-size: 0.7rem;
      color: var(--muted);
    }

    .card-actions { display: flex; gap: 0.4rem; }

    /* ── LETTER GROUP HEADER ── */
    .letter-group { margin-bottom: 0.5rem; }

    .letter-header {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.5rem 0;
      margin-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .letter-header::before {
      content: attr(data-letter);
      font-size: 1.5rem;
      color: var(--accent);
      font-weight: 800;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.4;
    }

    .empty-state h3 {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 520px;
      padding: 2rem;
      position: relative;
      transform: translateY(16px);
      transition: transform 0.2s;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .modal h2 span { color: var(--accent); }

    .form-group { margin-bottom: 1.1rem; }

    .form-label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    textarea { min-height: 80px; resize: vertical; }

    /* ── FILE DROP ZONE ── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      background: var(--bg);
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(232,255,71,0.04);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-zone-icon { font-size: 1.8rem; margin-bottom: 0.5rem; }

    .drop-zone-text {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .drop-zone-text strong { color: var(--accent); }

    .file-chosen {
      font-size: 0.78rem;
      color: var(--accent2);
      margin-top: 0.5rem;
      word-break: break-all;
    }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }

    .close-btn {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: var(--surface2);
      border: none;
      color: var(--muted);
      width: 30px;
      height: 30px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .close-btn:hover { background: var(--border); color: var(--text); }

    /* ── SORT CHIPS ── */
    .sort-chips { display: flex; gap: 0.5rem; }

    .sort-chip {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      padding: 0.4rem 0.85rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .sort-chip.active {
      background: var(--surface2);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.8rem;
      padding: 0.75rem 1.25rem;
      border-radius: var(--radius);
      z-index: 999;
      transform: translateY(20px);
      opacity: 0;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--accent); }
    .toast.error { border-color: var(--danger); }

    /* ── CATEGORY TAGS ── */
    .category-filter-wrap { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1.25rem; }

    .cat-chip {
      font-size: 0.72rem;
      padding: 0.3rem 0.7rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
    }

    .cat-chip:hover { color: var(--text); }
    .cat-chip.active { background: var(--accent2); color: #0b0c0f; border-color: var(--accent2); }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .container { padding: 1rem; }
      .controls { flex-direction: column; }
      .sort-chips { width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    Script<span>LIB</span>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" id="sortNameBtn" onclick="setSort('name')">↑↓ Name</button>
    <button class="btn btn-primary" onclick="openModal()">+ Upload Script</button>
  </div>
</header>

<div class="container">
  <div class="hero">
    <h1>Your Script<br/><em>Library.</em></h1>
    <p>Upload, organise, and share JavaScript scripts. Filter by letter, category, or search by name.</p>
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-value" id="totalCount">0</div>
        <div class="stat-label">Scripts</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="catCount">0</div>
        <div class="stat-label">Categories</div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" id="searchInput" placeholder="Search scripts…" oninput="renderScripts()" />
    </div>
    <div class="sort-chips">
      <div class="sort-chip active" id="chip-name" onclick="setSort('name')">A–Z Name</div>
      <div class="sort-chip" id="chip-date" onclick="setSort('date')">Newest</div>
    </div>
  </div>

  <!-- Category filter -->
  <div class="category-filter-wrap" id="catFilters"></div>

  <!-- Alphabet Index -->
  <div class="alpha-index" id="alphaIndex"></div>

  <!-- Scripts -->
  <div id="scriptContainer"></div>
</div>

<!-- Upload Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <h2>Upload <span>Script</span></h2>

    <div class="form-group">
      <label class="form-label">Script File (.js, .txt)</label>
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".js,.txt,.ts,.json" onchange="handleFileSelect(event)" />
        <div class="drop-zone-icon">📂</div>
        <div class="drop-zone-text">Drop your file here or <strong>click to browse</strong></div>
        <div class="file-chosen" id="fileChosen"></div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Script Name *</label>
      <input type="text" id="inputName" placeholder="e.g. data-formatter.js" />
    </div>

    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea id="inputDesc" placeholder="What does this script do?"></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">Category</label>
      <input type="text" id="inputCat" placeholder="e.g. Utilities, Animations, API…" list="catSuggestions" />
      <datalist id="catSuggestions"></datalist>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveScript()">Save Script →</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── STATE ──
  let scripts = JSON.parse(localStorage.getItem('scriptLib') || '[]');
  let currentSort = 'name';
  let currentLetter = null;
  let currentCat = null;

  // ── MODAL ──
  let selectedFile = null;

  function openModal() {
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('inputName').value = '';
    document.getElementById('inputDesc').value = '';
    document.getElementById('inputCat').value = '';
    document.getElementById('fileChosen').textContent = '';
    document.getElementById('fileInput').value = '';
    selectedFile = null;
    updateCatSuggestions();
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  function handleFileSelect(e) {
    const file = e.target.files[0];
    if (!file) return;
    selectedFile = file;
    document.getElementById('fileChosen').textContent = '✓ ' + file.name;
    if (!document.getElementById('inputName').value) {
      document.getElementById('inputName').value = file.name;
    }
  }

  // ── DRAG & DROP ──
  const dropZone = document.getElementById('dropZone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) {
      selectedFile = file;
      document.getElementById('fileChosen').textContent = '✓ ' + file.name;
      if (!document.getElementById('inputName').value) {
        document.getElementById('inputName').value = file.name;
      }
    }
  });

  // ── SAVE ──
  function saveScript() {
    const name = document.getElementById('inputName').value.trim();
    const desc = document.getElementById('inputDesc').value.trim();
    const cat  = document.getElementById('inputCat').value.trim();

    if (!name) { showToast('Please enter a script name.', 'error'); return; }
    if (!selectedFile) { showToast('Please select a file.', 'error'); return; }

    const reader = new FileReader();
    reader.onload = function(e) {
      const content = e.target.result;
      const id = Date.now().toString(36) + Math.random().toString(36).slice(2);
      const entry = {
        id,
        name,
        desc,
        cat: cat || 'Uncategorised',
        filename: selectedFile.name,
        size: selectedFile.size,
        content,
        date: new Date().toISOString()
      };
      scripts.push(entry);
      persistScripts();
      closeModal();
      renderScripts();
      showToast('✓ Script saved successfully!', 'success');
    };
    reader.readAsText(selectedFile);
  }

  function persistScripts() {
    try {
      localStorage.setItem('scriptLib', JSON.stringify(scripts));
    } catch(e) {
      showToast('Storage full! Some older scripts may not save.', 'error');
    }
  }

  // ── DELETE ──
  function deleteScript(id) {
    if (!confirm('Delete this script?')) return;
    scripts = scripts.filter(s => s.id !== id);
    persistScripts();
    renderScripts();
    showToast('Script removed.', '');
  }

  // ── DOWNLOAD ──
  function downloadScript(id) {
    const s = scripts.find(s => s.id === id);
    if (!s) return;
    const blob = new Blob([s.content], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = s.filename || s.name;
    a.click();
    URL.revokeObjectURL(url);
    showToast('↓ Downloading ' + s.name, 'success');
  }

  // ── SORT ──
  function setSort(type) {
    currentSort = type;
    document.querySelectorAll('.sort-chip').forEach(c => c.classList.remove('active'));
    document.getElementById('chip-' + type).classList.add('active');
    renderScripts();
  }

  // ── LETTER FILTER ──
  function setLetter(l) {
    currentLetter = currentLetter === l ? null : l;
    renderAlpha();
    renderScripts();
  }

  // ── CAT FILTER ──
  function setCat(c) {
    currentCat = currentCat === c ? null : c;
    renderCatFilters();
    renderScripts();
  }

  // ── FILTER & SORT ──
  function getFiltered() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    return scripts
      .filter(s => {
        const matchQ = !q || s.name.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q) || s.cat.toLowerCase().includes(q);
        const matchL = !currentLetter || s.name[0].toUpperCase() === currentLetter;
        const matchC = !currentCat || s.cat === currentCat;
        return matchQ && matchL && matchC;
      })
      .sort((a, b) => {
        if (currentSort === 'name') return a.name.localeCompare(b.name);
        return new Date(b.date) - new Date(a.date);
      });
  }

  // ── RENDER ──
  function renderScripts() {
    const filtered = getFiltered();
    const container = document.getElementById('scriptContainer');

    // Update stats
    const allCats = [...new Set(scripts.map(s => s.cat))];
    document.getElementById('totalCount').textContent = scripts.length;
    document.getElementById('catCount').textContent = allCats.length;

    if (!filtered.length) {
      container.innerHTML = `
        <div class="scripts-grid">
          <div class="empty-state">
            <div class="empty-state-icon">📭</div>
            <h3>No scripts found</h3>
            <p>Try a different search or upload your first script.</p>
          </div>
        </div>`;
      return;
    }

    if (currentSort === 'name' && !currentLetter) {
      // Group by first letter
      const groups = {};
      filtered.forEach(s => {
        const l = s.name[0].toUpperCase();
        if (!groups[l]) groups[l] = [];
        groups[l].push(s);
      });
      const letters = Object.keys(groups).sort();

      container.innerHTML = letters.map(l => `
        <div class="letter-group" id="group-${l}">
          <div class="letter-header" data-letter="${l}">
            <span style="margin-left:2.2rem">${groups[l].length} script${groups[l].length>1?'s':''}</span>
          </div>
          <div class="scripts-grid">
            ${groups[l].map(cardHTML).join('')}
          </div>
        </div>
      `).join('');
    } else {
      container.innerHTML = `<div class="scripts-grid">${filtered.map(cardHTML).join('')}</div>`;
    }
  }

  function cardHTML(s) {
    const size = s.size < 1024 ? s.size + ' B' : (s.size/1024).toFixed(1) + ' KB';
    const date = new Date(s.date).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
    return `
      <div class="script-card">
        <div class="card-top">
          <div>
            <div class="card-initial">${s.name[0].toUpperCase()}</div>
            <div class="card-name">${escHtml(s.name)}</div>
          </div>
          <div class="card-badge">${escHtml(s.cat)}</div>
        </div>
        <div class="card-desc">${s.desc ? escHtml(s.desc) : '<em>No description</em>'}</div>
        <div class="card-footer">
          <div class="card-meta">${escHtml(s.filename)} · ${size}<br/>${date}</div>
          <div class="card-actions">
            <button class="btn btn-download" onclick="downloadScript('${s.id}')">↓ Download</button>
            <button class="btn btn-danger" onclick="deleteScript('${s.id}')">✕</button>
          </div>
        </div>
      </div>`;
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── ALPHA INDEX ──
  function renderAlpha() {
    const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    const existing = new Set(scripts.map(s => s.name[0].toUpperCase()));
    document.getElementById('alphaIndex').innerHTML = letters.map(l => {
      const has = existing.has(l);
      const active = currentLetter === l ? 'active' : '';
      const cls = has ? (active || 'has-items') : 'empty';
      return `<div class="alpha-btn ${cls}" onclick="${has?`setLetter('${l}')`:''}"> ${l}</div>`;
    }).join('');
  }

  // ── CATEGORY FILTERS ──
  function renderCatFilters() {
    const cats = [...new Set(scripts.map(s => s.cat))].sort();
    if (!cats.length) { document.getElementById('catFilters').innerHTML=''; return; }
    document.getElementById('catFilters').innerHTML =
      `<div class="cat-chip ${!currentCat?'active':''}" onclick="setCat(null)">All</div>` +
      cats.map(c => `<div class="cat-chip ${currentCat===c?'active':''}" onclick="setCat('${escHtml(c)}')">${escHtml(c)}</div>`).join('');
  }

  function updateCatSuggestions() {
    const cats = [...new Set(scripts.map(s => s.cat))];
    document.getElementById('catSuggestions').innerHTML = cats.map(c => `<option value="${escHtml(c)}">`).join('');
  }

  // ── TOAST ──
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + (type || '');
    setTimeout(() => t.className = 'toast', 2800);
  }

  // ── INIT ──
  function init() {
    renderAlpha();
    renderCatFilters();
    renderScripts();
  }

  init();
</script>
</body>
</html>
